<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIP VPS AUTO SCRIPT by Jubair Sensei</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class', // Enables toggling via class on html tag
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              mono: ['Roboto Mono', 'monospace'],
            },
            colors: {
              // Dark Mode Colors
              bgDark: '#0d1117',
              cardDark: '#161b22',
              borderDark: '#30363d',
              
              // Light Mode Colors
              bgLight: '#f3f4f6',
              cardLight: '#ffffff',
              borderLight: '#e5e7eb',

              // Shared/Accent
              accent: '#4ade80',  /* Green-400 */
              accentHover: '#22c55e', /* Green-500 */
              glow: '#22c55e' 
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-slow': 'spin 8s linear infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Grid Pattern Overlay - Adapts to mode */
      .bg-grid-pattern {
        background-size: 30px 30px;
        background-image: 
          linear-gradient(to right, rgba(128, 128, 128, 0.1) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(128, 128, 128, 0.1) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      }

      /* Default cursor for everyone first */
      cursor: auto;
      
      /* Only hide cursor on devices that have a fine pointer (mouse) */
      @media (hover: hover) and (pointer: fine) {
        body {
          cursor: none;
        }
      }
      
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4ade80; 
      }
      
      /* Light mode scrollbar adjustment */
      html:not(.dark) ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
      }
      html:not(.dark) ::-webkit-scrollbar-thumb:hover {
        background: #4ade80;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.29.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-bgLight text-gray-800 dark:bg-bgDark dark:text-[#c9d1d9]">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
